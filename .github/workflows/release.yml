name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.REGISTRY_USERNAME }}/meridian:${{ steps.version.outputs.version }}
            ${{ vars.REGISTRY_USERNAME }}/meridian:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

      - name: Bump Chart version and push
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          git fetch origin main
          git checkout -B main origin/main
          sed -i "s/^version:.*/version: ${VERSION}/" helm/meridian/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/meridian/Chart.yaml
          git add helm/meridian/Chart.yaml
          git diff --cached --quiet || git commit -m "chore: release ${GITHUB_REF_NAME}"
          git push origin main

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run chart releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: helm
